<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360 AR Camera</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: system-ui, -apple-system, sans-serif;
        }
        #webcam {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            z-index: 2; transform: scaleX(-1);
            mix-blend-mode: screen; pointer-events: none;
        }
        #glCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }
        #btnStart {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; padding: 18px 36px; background: #007aff; color: white;
            border: none; border-radius: 30px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,122,255,0.4);
        }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <button id="btnStart">Launch AR Environment</button>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="glCanvas"></canvas>

    <script>
        // Automatic determination of the subdirectory path for GitHub Pages
        const repoPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(repoPath + 'sw.js', { scope: repoPath })
                    .then(() => console.log('PWA Registered successfully under scope:', repoPath))
                    .catch(err => console.error('SW Error:', err));
            });
        }

        const video = document.getElementById('webcam');
        const glCanvas = document.getElementById('glCanvas');
        const btnStart = document.getElementById('btnStart');

        let scene, camera, renderer, sphere;

        function init360() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
            
            renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1);

            // Dynamically build image URL path
            const texture = new THREE.TextureLoader().load(repoPath + 'background360.webp.webp');
            const material = new THREE.MeshBasicMaterial({ map: texture });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            window.addEventListener('resize', onResize);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function initSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', rotateBackground);
                    } else {
                        alert("Sensor permissions required for 360-degree rotation.");
                    }
                }).catch(err => console.error("Sensor block:", err));
            } else {
                window.addEventListener('deviceorientation', rotateBackground);
            }
        }

        function rotateBackground(e) {
            if (!e.alpha) return;
            const alpha = THREE.MathUtils.degToRad(e.alpha);
            const beta = THREE.MathUtils.degToRad(e.beta);
            const gamma = THREE.MathUtils.degToRad(e.gamma);
            
            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            camera.quaternion.setFromEuler(euler);
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(stream => { video.srcObject = stream; })
                .catch(err => alert("Camera blocked or unavailable over non-HTTPS connection."));
        }

        btnStart.addEventListener('click', () => {
            btnStart.style.display = 'none';
            init360();
            initSensors();
            startCamera();
        });
    </script>
</body>
</html>
