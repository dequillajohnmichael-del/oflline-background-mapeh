<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360 AR Camera System</title>
    <!-- Stable production build of A-Frame -->
    <script src="https://cloudflare.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }
        /* Your active, mirrored camera layer blended over the 360 space */
        #webcam {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; 
            z-index: 2; 
            transform: scaleX(-1);
            /* This strips out the room background behind you and keeps your face */
            mix-blend-mode: screen; 
            pointer-events: none; 
            display: none;
        }
        /* Custom UI Start button layer handling iOS/Android requirements */
        #interactiveOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: #111; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .start-btn {
            background: #007aff; color: white; border: none; font-family: sans-serif;
            padding: 20px 40px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,122,255,0.4);
        }
    </style>
</head>
<body>

    <!-- Permission Trigger Interface overlay -->
    <div id="interactiveOverlay">
        <button class="start-btn" id="startAR">Launch AR Video Call</button>
        <p style="color: #666; font-family: sans-serif; margin-top:15px; font-size:14px;">Activates camera and 360° motion sensors</p>
    </div>

    <!-- Natively hardware-accelerated video view element layer -->
    <video id="webcam" autoplay playsinline muted></video>

    <!-- Stable A-Frame Scene Layer -->
    <a-scene vr-mode-ui="enabled: false" loading-screen="enabled: false">
        <a-assets>
            <!-- Image source path will be injected dynamically via JavaScript below -->
            <img id="spaceBg" crossorigin="anonymous">
        </a-assets>

        <!-- Wrapped space sphere geometry bubble mapped over camera node coordinates -->
        <a-sky src="#spaceBg" rotation="0 -90 0"></a-sky>

        <!-- Automated orientation tracking component platform camera controller -->
        
    </a-scene>

    <script>
        const startBtn = document.getElementById('startAR');
        const overlay = document.getElementById('interactiveOverlay');
        const webcam = document.getElementById('webcam');
        const bgAsset = document.getElementById('spaceBg');

        // Dynamically compute the path to your folder on GitHub Pages
        const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        bgAsset.src = basePath + 'background360.webp.webp';

        function startCamera() {
            webcam.style.display = 'block';
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: false 
            })
            .then(stream => {
                webcam.srcObject = stream;
                overlay.style.display = 'none'; // Closes screen block interface seamlessly
            })
            .catch(err => {
                alert("Camera blocked. Please access your URL strictly via secure HTTPS protocol layout.");
            });
        }

        startBtn.addEventListener('click', () => {
            startCamera();
        });
    </script>
</body>
</html>
